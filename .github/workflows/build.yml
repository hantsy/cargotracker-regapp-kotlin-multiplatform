name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  # ── Android ──────────────────────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug
      - name: Run Android unit tests
        run: ./gradlew :androidApp:testDebugUnitTest
      - name: Upload Android APK
        uses: actions/upload-artifact@v5
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/androidApp-debug.apk

  # ── Desktop ──────────────────────────────────────────────────────────────────
  desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            package-task: packageDeb
            artifact-name: desktop-linux-deb
            artifact-path: desktopApp/build/compose/binaries/main/deb/*.deb
          - os: windows-latest
            package-task: packageMsi
            artifact-name: desktop-windows-msi
            artifact-path: desktopApp/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            package-task: packageDmg
            artifact-name: desktop-macos-dmg
            artifact-path: desktopApp/build/compose/binaries/main/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'
      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg-dev
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build Desktop native package
        run: ./gradlew :desktopApp:${{ matrix.package-task }}
      - name: Upload Desktop package
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  # ── Web (JS + Wasm) ──────────────────────────────────────────────────────────
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build JS distribution
        run: ./gradlew :webApp:jsBrowserDistribution
      - name: Build Wasm distribution
        run: ./gradlew :webApp:wasmJsBrowserDistribution
      - name: Upload Web JS artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-js
          path: webApp/build/dist/js/productionExecutable/
      - name: Upload Web Wasm artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-wasm
          path: webApp/build/dist/wasmJs/productionExecutable/

  # ── iOS ──────────────────────────────────────────────────────────────────────
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Run iOS simulator tests
        run: ./gradlew :sharedUI:iosSimulatorArm64Test
      - name: Build iOS framework
        run: ./gradlew :sharedUI:linkDebugFrameworkIosSimulatorArm64
      - name: Upload iOS framework
        uses: actions/upload-artifact@v5
        with:
          name: ios-framework
          path: sharedUI/build/bin/iosSimulatorArm64/debugFramework/
